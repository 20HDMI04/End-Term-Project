name: Deploy TypeDoc
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install

      - name: Generate Docs
        run: |
          npx typedoc \
          --entryPoints apps/backend/src \
          --entryPointStrategy expand \
          --tsconfig apps/backend/tsconfig.json \
          --out docs_backend \
          --githubPages true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs_backend"

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
